<section class="app-screen search-screen" data-app-view="buscar">
  <section class="surface-panel screen-hero screen-hero-compact">
    <div class="section-head">
      <p class="header-kicker">Búsqueda global</p>
      <h1>Buscar</h1>
      <p>Acceso rápido a diagnósticos, técnicas, calculadoras y fármacos con lectura clínica inmediata y filtros por tipo de contenido.</p>
    </div>
  </section>
  <label class="search-page-input">
    <span>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="6.5"></circle>
        <path d="m16 16 5 5"></path>
      </svg>
    </span>
    <input type="search" placeholder="Escribe un diagnóstico, score, procedimiento o fármaco" data-search-page-input autocomplete="off" />
  </label>
  <div class="filter-row" data-search-filters></div>
  <div class="compact-grid">
    <div class="surface-panel">
      <div class="section-head">
        <h2>Resultados</h2>
      </div>
      <div data-search-results></div>
    </div>
    <div class="surface-panel">
      <div class="section-head">
        <h2>Historial</h2>
      </div>
      <div data-search-history></div>
    </div>
  </div>
</section>
