<section class="app-screen catalog-screen" data-app-view="vademecum">
  <div class="section-head section-head-compact">
    <h1>Vademécum</h1>
    <p>Consulta farmacológica con búsqueda central, favoritos, recientes y cálculos interactivos.</p>
  </div>

  <label class="search-page-input" style="max-width: 100%;">
    <span>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="6.5"></circle>
        <path d="m16 16 5 5"></path>
      </svg>
    </span>
    <input data-vademecum-search type="search" placeholder="Buscar medicamento..." autocomplete="off" />
  </label>

  <div class="catalog-group">
    <div class="catalog-group-title">
      <h2>Favoritos</h2>
      <span class="catalog-group-count" data-vademecum-favorites-count>0</span>
    </div>
    <div class="catalog-group-grid" data-vademecum-favorites></div>
  </div>

  <div class="catalog-group">
    <div class="catalog-group-title">
      <h2>Recientes</h2>
      <span class="catalog-group-count" data-vademecum-recents-count>0</span>
    </div>
    <div class="catalog-group-grid" data-vademecum-recents></div>
  </div>

  <div class="segmented-control" data-vademecum-tabs>
    <button class="segmented-control-button is-active" type="button" data-vademecum-tab="fichas">Fichas</button>
    <button class="segmented-control-button" type="button" data-vademecum-tab="pediatria">Dosis pediátrica</button>
    <button class="segmented-control-button" type="button" data-vademecum-tab="interacciones">Interacciones</button>
  </div>

  <div data-vademecum-root></div>
</section>
